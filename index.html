<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="lock in.">
<title>lock in.</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.07); --text: #f0f0f0; --muted: #555;
    --accent: #c8f135; --accent2: #3dffd0; --radius: 16px;
  }
  body {
    background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif;
    min-height: 100dvh; display: flex; justify-content: center;
    align-items: flex-start; overflow-x: hidden;
  }
  .phone {
    width: 100%; max-width: 390px; min-height: 100dvh;
    background: var(--bg); display: flex; flex-direction: column;
    position: relative; overflow: hidden;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }
  .phone::before {
    content: ''; position: fixed; top: -120px; left: 50%;
    transform: translateX(-50%); width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(200,241,53,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .header {
    padding: calc(env(safe-area-inset-top, 0px) + 40px) 24px 20px;
    position: relative; z-index: 1;
  }
  .brand { font-weight: 800; font-size: 28px; letter-spacing: -1px; color: var(--text); }
  .brand span { color: var(--accent); }
  .date-pill {
    display: inline-block; margin-top: 6px;
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  }
  .stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    padding: 0 24px 24px; position: relative; z-index: 1;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
    position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,241,53,0.3), transparent);
  }
  .stat-label {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .stat-value {
    font-family: 'Space Mono', monospace; font-size: 32px;
    font-weight: 700; color: var(--text); line-height: 1;
  }
  .stat-value span { font-size: 14px; color: var(--muted); font-weight: 400; margin-left: 2px; }
  .stat-value.accent { color: var(--accent); }
  .progress-wrap { padding: 0 24px 28px; position: relative; z-index: 1; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .progress-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .progress-pct { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); }
  .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); width: 0%;
  }
  .section-label {
    padding: 0 24px 12px; font-size: 11px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; color: var(--muted); position: relative; z-index: 1;
  }
  .habits { padding: 0 24px; display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 1; }
  .habit-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
    display: flex; align-items: center; gap: 16px; cursor: pointer;
    transition: all 0.25s ease; position: relative; overflow: hidden;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .habit-item::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(200,241,53,0.05), transparent);
    opacity: 0; transition: opacity 0.3s ease;
  }
  .habit-item.done::before { opacity: 1; }
  .habit-item.done { border-color: rgba(200,241,53,0.2); }
  .habit-item:active { transform: scale(0.98); }
  .habit-icon {
    font-size: 22px; width: 40px; height: 40px; display: flex;
    align-items: center; justify-content: center; background: var(--surface2);
    border-radius: 12px; flex-shrink: 0; transition: all 0.3s ease;
  }
  .habit-item.done .habit-icon { background: rgba(200,241,53,0.1); }
  .habit-info { flex: 1; }
  .habit-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; transition: color 0.3s ease; }
  .habit-item.done .habit-name { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(200,241,53,0.4); }
  .habit-sub { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }
  .habit-check {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--muted);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .habit-item.done .habit-check { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }
  .checkmark {
    opacity: 0; transform: scale(0) rotate(-45deg);
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    font-size: 13px; color: #000; font-weight: 900; line-height: 1;
  }
  .habit-item.done .checkmark { opacity: 1; transform: scale(1) rotate(0deg); }
  .footer { margin-top: 28px; padding: 0 24px 48px; position: relative; z-index: 1; }
  .streak-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .streak-num { font-family: 'Space Mono', monospace; font-size: 36px; font-weight: 700; color: var(--accent); line-height: 1; }
  .streak-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
  .streak-dots { display: flex; gap: 6px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--surface2); transition: all 0.3s ease; }
  .dot.filled { background: var(--accent); }
  .dot.today { background: var(--accent); box-shadow: 0 0 8px var(--accent); transform: scale(1.3); }
  .all-done-banner {
    margin: 16px 24px 0;
    background: linear-gradient(135deg, rgba(200,241,53,0.12), rgba(61,255,208,0.08));
    border: 1px solid rgba(200,241,53,0.25); border-radius: var(--radius);
    padding: 16px 20px; display: none; align-items: center; gap: 12px; position: relative; z-index: 1;
  }
  .all-done-banner.show { display: flex; }
  .all-done-banner .msg { font-size: 14px; font-weight: 700; color: var(--accent); }
  .all-done-banner .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .toast {
    position: fixed; bottom: calc(32px + env(safe-area-inset-bottom, 0px));
    left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: #000; font-weight: 700; font-size: 13px;
    padding: 12px 24px; border-radius: 100px; letter-spacing: 0.5px;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); z-index: 100; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .offline-bar {
    display: none; background: #ff4444; color: #fff; text-align: center;
    font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 6px; position: relative; z-index: 10;
  }
  .offline-bar.show { display: block; }
</style>
</head>
<body>
<div class="offline-bar" id="offlineBar">⚠ OFFLINE — i dati sono salvati localmente</div>
<div class="phone">
  <div class="header">
    <div class="brand">lock in<span>.</span></div>
    <div class="date-pill" id="dateLabel"></div>
  </div>
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Completati</div>
      <div class="stat-value accent" id="statDone">0<span>/ 5</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="statStreak">1<span>gg</span></div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-header">
      <div class="progress-label">Progresso giornaliero</div>
      <div class="progress-pct" id="pctLabel">0%</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="all-done-banner" id="allDoneBanner">
    <span style="font-size:24px">🔥</span>
    <div><div class="msg">Giornata perfetta!</div><div class="sub">Tutte le abitudini completate.</div></div>
  </div>
  <div class="section-label">Abitudini — Oggi</div>
  <div class="habits" id="habitsList"></div>
  <div class="footer">
    <div class="streak-card">
      <div class="streak-info">
        <div class="streak-num" id="streakNum">1</div>
        <div class="streak-label">Giorni di fila</div>
      </div>
      <div class="streak-dots" id="streakDots"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const habits = [
  { id: 'training', icon: '🏋️', name: 'Allenamento',     sub: 'ogni giorno' },
  { id: 'reading',  icon: '📚', name: 'Lettura',          sub: '15 pagine' },
  { id: 'room',     icon: '🛏️', name: 'Sistemare camera', sub: 'ogni giorno' },
  { id: 'plan',     icon: '📋', name: 'Pianificazione',   sub: 'per il giorno dopo' },
  { id: 'pushups',  icon: '💪', name: '75 Push Up',       sub: 'ogni giorno' },
];
const today = new Date().toISOString().slice(0,10);
let saved = JSON.parse(localStorage.getItem('lockin_'+today)||'{}');

function calcStreak() {
  let s=0, d=new Date();
  while(s<365) {
    const k='lockin_'+d.toISOString().slice(0,10);
    const data=JSON.parse(localStorage.getItem(k)||'{}');
    if(habits.every(h=>data[h.id])){ s++; d.setDate(d.getDate()-1); } else break;
  }
  return Math.max(s,1);
}

const days=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const months=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const now=new Date();
document.getElementById('dateLabel').textContent=
  days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();

const list=document.getElementById('habitsList');
habits.forEach(h=>{
  const el=document.createElement('div');
  el.className='habit-item'+(saved[h.id]?' done':'');
  el.innerHTML=`
    <div class="habit-icon">${h.icon}</div>
    <div class="habit-info"><div class="habit-name">${h.name}</div><div class="habit-sub">${h.sub}</div></div>
    <div class="habit-check"><span class="checkmark">✓</span></div>`;
  el.addEventListener('click',()=>toggle(h.id,el));
  list.appendChild(el);
});

function toggle(id,el){
  saved[id]=!saved[id];
  localStorage.setItem('lockin_'+today,JSON.stringify(saved));
  el.classList.toggle('done',saved[id]);
  updateUI();
  if(saved[id]) showToast(habits.find(h=>h.id===id).name+' ✓');
}

function updateUI(){
  const done=Object.values(saved).filter(Boolean).length;
  const pct=Math.round(done/habits.length*100);
  document.getElementById('statDone').innerHTML=`${done}<span>/ ${habits.length}</span>`;
  document.getElementById('pctLabel').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('allDoneBanner').classList.toggle('show',done===habits.length);
  const streak=calcStreak();
  document.getElementById('streakNum').textContent=streak;
  document.getElementById('statStreak').innerHTML=`${streak}<span>gg</span>`;
  const wrap=document.getElementById('streakDots');
  wrap.innerHTML='';
  for(let i=0;i<7;i++){
    const d=document.createElement('div');
    const n=Math.min(streak,7);
    d.className='dot'+(i===n-1?' today':i<n?' filled':'');
    wrap.appendChild(d);
  }
}

let tt;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),2000);
}

window.addEventListener('online',()=>document.getElementById('offlineBar').classList.remove('show'));
window.addEventListener('offline',()=>document.getElementById('offlineBar').classList.add('show'));
if(!navigator.onLine) document.getElementById('offlineBar').classList.add('show');

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

updateUI();
</script>
</body>
</html>
